<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 435" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>HyperJIS Keyboard Layout</title>
  <desc>Diagram showing all key remappings in the HyperJIS layout for Apple JIS keyboards</desc>
  <defs>
    <style>
      .k { rx: 5; stroke-width: 1; }
      .k-mod { fill: #E1F5EE; stroke: #5DCAA5; }
      .k-nav { fill: #FAEEDA; stroke: #EF9F27; }
      .k-spc { fill: #EEEDFE; stroke: #AFA9EC; }
      .k-acc { fill: #FBEAF0; stroke: #ED93B1; }
      .k-def { fill: #F5F5F0; stroke: #D3D1C7; }
      .t-func { font-size: 11px; font-weight: 600; fill: #2C2C2A; text-anchor: middle; }
      .t-phys { font-size: 8px; font-weight: 400; fill: #888780; text-anchor: middle; }
      .t-sub { font-size: 7.5px; font-weight: 400; fill: #5F5E5A; text-anchor: middle; }
      .t-mod-f { fill: #04342C; }
      .t-nav-f { fill: #633806; }
      .t-spc-f { fill: #26215C; }
      .t-acc-f { fill: #4B1528; }
      .t-title { font-size: 16px; font-weight: 600; fill: #888780; text-anchor: middle; }
      .t-legend { font-size: 10px; fill: #888780; }
      .t-cascade-label { font-size: 10px; fill: #888780; text-anchor: end; font-family: monospace; }
      .t-cascade-val { font-size: 10px; fill: #B4B2A9; font-weight: 600; font-family: monospace; }
      .t-cascade-arrow { font-size: 10px; fill: #888780; }
      @media (prefers-color-scheme: dark) {
        .k-mod { fill: #0a3d31; stroke: #1D9E75; }
        .k-nav { fill: #3d2a08; stroke: #BA7517; }
        .k-spc { fill: #2a2854; stroke: #7F77DD; }
        .k-acc { fill: #3d1528; stroke: #D4537E; }
        .k-def { fill: #333330; stroke: #5F5E5A; }
        .t-func { fill: #E8E6DD; }
        .t-phys { fill: #888780; }
        .t-sub { fill: #B4B2A9; }
        .t-mod-f { fill: #9FE1CB; }
        .t-nav-f { fill: #FAC775; }
        .t-spc-f { fill: #CECBF6; }
        .t-acc-f { fill: #F4C0D1; }
      }
    </style>
  </defs>

  <!-- Title -->
  <text class="t-title" x="390" y="28">HyperJIS — Apple JIS Keyboard Layout</text>

  <!-- Legend -->
  <rect x="120" y="40" width="12" height="12" rx="2" class="k k-mod"/>
  <text class="t-legend" x="136" y="50">Modifier remap</text>
  <rect x="250" y="40" width="12" height="12" rx="2" class="k k-nav"/>
  <text class="t-legend" x="266" y="50">Vim navigation / tiling</text>
  <rect x="420" y="40" width="12" height="12" rx="2" class="k k-spc"/>
  <text class="t-legend" x="436" y="50">Special function</text>
  <rect x="560" y="40" width="12" height="12" rx="2" class="k k-acc"/>
  <text class="t-legend" x="576" y="50">Italian accent layer (Fn+)</text>

  <!-- ===== ROW 1: Number row ===== y=68 -->
  <rect x="14" y="68" width="48" height="36" class="k k-spc"/>
  <text class="t-func t-spc-f" x="38" y="82">⇧⌘4</text>
  <text class="t-phys" x="38" y="95">esc</text>

  <rect x="66" y="68" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="86" y="90">1</text>
  <rect x="110" y="68" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="130" y="90">2</text>
  <rect x="154" y="68" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="174" y="90">3</text>

  <rect x="198" y="68" width="40" height="36" class="k k-acc"/>
  <text class="t-func t-acc-f" x="218" y="84">4</text>
  <text class="t-sub" x="218" y="96">Fn→€</text>

  <rect x="242" y="68" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="262" y="90">5</text>
  <rect x="286" y="68" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="306" y="90">6</text>
  <rect x="330" y="68" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="350" y="90">7</text>
  <rect x="374" y="68" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="394" y="90">8</text>
  <rect x="418" y="68" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="438" y="90">9</text>
  <rect x="462" y="68" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="482" y="90">0</text>
  <rect x="506" y="68" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="526" y="90">-</text>
  <rect x="550" y="68" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="570" y="90">^</text>

  <rect x="594" y="68" width="40" height="36" class="k k-spc"/>
  <text class="t-func t-spc-f" x="614" y="82">` ~</text>
  <text class="t-phys" x="614" y="95">¥</text>

  <rect x="638" y="68" width="56" height="36" class="k k-def"/>
  <text class="t-func" x="666" y="90">⌫</text>

  <!-- ===== ROW 2: QWERTY ===== y=108 -->
  <rect x="14" y="108" width="56" height="36" class="k k-def"/>
  <text class="t-func" x="42" y="130">Tab</text>

  <rect x="74" y="108" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="94" y="130">Q</text>
  <rect x="118" y="108" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="138" y="130">W</text>

  <rect x="162" y="108" width="40" height="36" class="k k-acc"/>
  <text class="t-func t-acc-f" x="182" y="124">E</text>
  <text class="t-sub" x="182" y="136">Fn→è/é</text>

  <rect x="206" y="108" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="226" y="130">R</text>
  <rect x="250" y="108" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="270" y="130">T</text>
  <rect x="294" y="108" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="314" y="130">Y</text>

  <rect x="338" y="108" width="40" height="36" class="k k-acc"/>
  <text class="t-func t-acc-f" x="358" y="124">U</text>
  <text class="t-sub" x="358" y="136">Fn→ù/ú</text>

  <rect x="382" y="108" width="40" height="36" class="k k-acc"/>
  <text class="t-func t-acc-f" x="402" y="124">I</text>
  <text class="t-sub" x="402" y="136">Fn→ì/í</text>

  <rect x="426" y="108" width="40" height="36" class="k k-acc"/>
  <text class="t-func t-acc-f" x="446" y="124">O</text>
  <text class="t-sub" x="446" y="136">Fn→ò/ó</text>

  <rect x="470" y="108" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="490" y="130">P</text>

  <rect x="514" y="108" width="40" height="36" class="k k-acc"/>
  <text class="t-func t-acc-f" x="534" y="124">[</text>
  <text class="t-sub" x="534" y="136">Fn→\u201C</text>

  <rect x="558" y="108" width="40" height="36" class="k k-acc"/>
  <text class="t-func t-acc-f" x="578" y="124">]</text>
  <text class="t-sub" x="578" y="136">Fn→\u201D</text>

  <rect x="602" y="108" width="40" height="76" rx="5" class="k k-def"/>
  <text class="t-func" x="622" y="150">⏎</text>

  <!-- ===== ROW 3: ASDF (home row) ===== y=148 -->
  <rect x="14" y="148" width="64" height="36" class="k k-mod"/>
  <text class="t-func t-mod-f" x="46" y="162">Fn</text>
  <text class="t-phys" x="46" y="175">⇪ Caps</text>

  <rect x="82" y="148" width="40" height="36" class="k k-acc"/>
  <text class="t-func t-acc-f" x="102" y="164">A</text>
  <text class="t-sub" x="102" y="176">Fn→à/á</text>

  <rect x="126" y="148" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="146" y="170">S</text>
  <rect x="170" y="148" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="190" y="170">D</text>
  <rect x="214" y="148" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="234" y="170">F</text>
  <rect x="258" y="148" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="278" y="170">G</text>

  <rect x="302" y="148" width="40" height="36" class="k k-nav"/>
  <text class="t-func t-nav-f" x="322" y="164">H</text>
  <text class="t-sub" x="322" y="176">Ctrl→←</text>

  <rect x="346" y="148" width="40" height="36" class="k k-nav"/>
  <text class="t-func t-nav-f" x="366" y="164">J</text>
  <text class="t-sub" x="366" y="176">Ctrl→↓</text>

  <rect x="390" y="148" width="40" height="36" class="k k-nav"/>
  <text class="t-func t-nav-f" x="410" y="164">K</text>
  <text class="t-sub" x="410" y="176">Ctrl→↑</text>

  <rect x="434" y="148" width="40" height="36" class="k k-nav"/>
  <text class="t-func t-nav-f" x="454" y="164">L</text>
  <text class="t-sub" x="454" y="176">Ctrl→→</text>

  <rect x="478" y="148" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="498" y="170">;</text>
  <rect x="522" y="148" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="542" y="170">:</text>
  <rect x="566" y="148" width="32" height="36" class="k k-def"/>
  <text class="t-func" x="582" y="170">\</text>

  <!-- ===== ROW 4: ZXCV ===== y=188 -->
  <rect x="14" y="188" width="80" height="36" class="k k-def"/>
  <text class="t-func" x="54" y="210">⇧</text>

  <rect x="98" y="188" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="118" y="210">Z</text>
  <rect x="142" y="188" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="162" y="210">X</text>
  <rect x="186" y="188" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="206" y="210">C</text>
  <rect x="230" y="188" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="250" y="210">V</text>
  <rect x="274" y="188" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="294" y="210">B</text>
  <rect x="318" y="188" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="338" y="210">N</text>
  <rect x="362" y="188" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="382" y="210">M</text>

  <rect x="406" y="188" width="40" height="36" class="k k-acc"/>
  <text class="t-func t-acc-f" x="426" y="204">,</text>
  <text class="t-sub" x="426" y="216">Fn→«</text>

  <rect x="450" y="188" width="40" height="36" class="k k-acc"/>
  <text class="t-func t-acc-f" x="470" y="204">.</text>
  <text class="t-sub" x="470" y="216">Fn→»</text>

  <rect x="494" y="188" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="514" y="210">/</text>

  <rect x="538" y="188" width="40" height="36" class="k k-spc"/>
  <text class="t-func t-spc-f" x="558" y="204">😀</text>
  <text class="t-phys" x="558" y="216">ろ</text>

  <rect x="582" y="188" width="72" height="36" class="k k-def"/>
  <text class="t-func" x="618" y="210">⇧</text>

  <!-- ===== ROW 5: Bottom modifier row ===== y=228 -->
  <rect x="14" y="228" width="40" height="36" class="k k-mod"/>
  <text class="t-func t-mod-f" x="34" y="240" style="font-size:9px">Hyper</text>
  <text class="t-phys" x="34" y="254">Fn</text>

  <rect x="58" y="228" width="48" height="36" class="k k-mod"/>
  <text class="t-func t-mod-f" x="82" y="240" style="font-size:8px">Esc/Ctrl</text>
  <text class="t-phys" x="82" y="254">⌃</text>

  <rect x="110" y="228" width="48" height="36" class="k k-mod"/>
  <text class="t-func t-mod-f" x="134" y="240" style="font-size:9px">Hyper</text>
  <text class="t-phys" x="134" y="254">⌥</text>

  <rect x="162" y="228" width="48" height="36" class="k k-mod"/>
  <text class="t-func t-mod-f" x="186" y="240" style="font-size:10px">⌥</text>
  <text class="t-phys" x="186" y="254">⌘</text>

  <rect x="214" y="228" width="52" height="36" class="k k-mod"/>
  <text class="t-func t-mod-f" x="240" y="240" style="font-size:10px">⌘</text>
  <text class="t-phys" x="240" y="254">英数</text>

  <rect x="270" y="228" width="170" height="36" class="k k-mod"/>
  <text class="t-func t-mod-f" x="355" y="240" style="font-size:9px">Space / Ctrl (hold)</text>
  <text class="t-phys" x="355" y="254">Space</text>

  <rect x="444" y="228" width="52" height="36" class="k k-mod"/>
  <text class="t-func t-mod-f" x="470" y="240" style="font-size:10px">⌘</text>
  <text class="t-phys" x="470" y="254">かな</text>

  <rect x="500" y="228" width="48" height="36" class="k k-mod"/>
  <text class="t-func t-mod-f" x="524" y="240" style="font-size:10px">⌥</text>
  <text class="t-phys" x="524" y="254">⌘</text>

  <rect x="552" y="228" width="40" height="36" class="k k-def"/>
  <text class="t-func" x="572" y="248">⌥</text>

  <!-- Arrow keys -->
  <rect x="600" y="228" width="38" height="36" class="k k-nav"/>
  <text class="t-func t-nav-f" x="619" y="240" style="font-size:9px">←</text>
  <text class="t-sub" x="619" y="254">Tile</text>

  <rect x="642" y="228" width="38" height="18" class="k k-nav"/>
  <text class="t-func t-nav-f" x="661" y="241" style="font-size:9px">↑</text>
  <rect x="642" y="246" width="38" height="18" class="k k-nav"/>
  <text class="t-func t-nav-f" x="661" y="259" style="font-size:9px">↓</text>

  <rect x="684" y="228" width="38" height="36" class="k k-nav"/>
  <text class="t-func t-nav-f" x="703" y="240" style="font-size:9px">→</text>
  <text class="t-sub" x="703" y="254">Tile</text>

  <!-- ===== MODIFIER CASCADE ===== y=290 -->
  <line x1="40" y1="284" x2="740" y2="284" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="t-title" x="390" y="310" style="font-size:13px">Modifier cascade</text>

  <text class="t-cascade-label" x="200" y="335">Caps Lock</text>
  <text class="t-cascade-arrow" x="210" y="335">→</text>
  <text class="t-cascade-val" x="225" y="335">Fn</text>

  <text class="t-cascade-label" x="200" y="352">Space (hold)</text>
  <text class="t-cascade-arrow" x="210" y="352">→</text>
  <text class="t-cascade-val" x="225" y="352">Control</text>

  <text class="t-cascade-label" x="200" y="369">Left Control (tap)</text>
  <text class="t-cascade-arrow" x="210" y="369">→</text>
  <text class="t-cascade-val" x="225" y="369">Escape</text>

  <text class="t-cascade-label" x="200" y="386">Left Control (hold)</text>
  <text class="t-cascade-arrow" x="210" y="386">→</text>
  <text class="t-cascade-val" x="225" y="386">Control</text>

  <text class="t-cascade-label" x="200" y="403">Left Option</text>
  <text class="t-cascade-arrow" x="210" y="403">→</text>
  <text class="t-cascade-val" x="225" y="403">Hyper (⌃⌥⇧⌘)</text>

  <text class="t-cascade-label" x="520" y="335">Left Command</text>
  <text class="t-cascade-arrow" x="530" y="335">→</text>
  <text class="t-cascade-val" x="545" y="335">Option</text>

  <text class="t-cascade-label" x="520" y="352">Eisuu (英数)</text>
  <text class="t-cascade-arrow" x="530" y="352">→</text>
  <text class="t-cascade-val" x="545" y="352">Left Command</text>

  <text class="t-cascade-label" x="520" y="369">Kana (かな)</text>
  <text class="t-cascade-arrow" x="530" y="369">→</text>
  <text class="t-cascade-val" x="545" y="369">Right Command</text>

  <text class="t-cascade-label" x="520" y="386">Fn (hold)</text>
  <text class="t-cascade-arrow" x="530" y="386">→</text>
  <text class="t-cascade-val" x="545" y="386">Hyper (⌃⌥⇧⌘)</text>

  <text class="t-cascade-label" x="520" y="403">Ctrl + HJKL</text>
  <text class="t-cascade-arrow" x="530" y="403">→</text>
  <text class="t-cascade-val" x="545" y="403">Arrow keys (Vim)</text>
</svg>
